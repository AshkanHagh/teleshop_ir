services:
  postgres:
    image: postgres:17.5
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-teleshop}
    networks:
      - private
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:latest
    command: >
      redis-server
      --save "60 1"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
      --appendonly no
    networks:
      - private
    volumes:
      - redisdata:/data
    restart: always

networks:
  private:

volumes:
  pgdata:
  redisdata:
